    "description": "Описание Горелки газомазутные ГМП-16 предназначены для раздельного сжигания природного газа и топочного мазута и используются с паровыми газомазутными котлами типа ДЕ-ГМ, а также с водогрейными котлами, разработанными на базе паровых котлов ДЕ-ГМ. Допускается кратковременное совместное сжигание газа и мазута во время перехода с одного вида топлива на другой. Горелки ГМП-16 выпускаются правого направления вращения воздуха (в случае необходимости есть возможность изготовления горелки левого направления вращения воздуха). Правым считается направление вращения воздуха по часовой стрелке, если смотреть на горелку с фронта котла, левым &ndash; против движения часовой стрелки. Горелки ГМП-16 по способу организации аэродинамики факела относятся к вихревым, по количеству воздушных потоков - к однопоточным. Основными элементами горелки ГМП-16 являются: паромеханическая форсунка, газовая часть, лопаточный завихритель воздуха, опора. Распыливание жидкого топлива в горелке осуществляется паромеханической быстросъемной форсункой. Паромеханическая форсунка состоит из: топливного ствола, паровой трубы, топливного завихрителя, парового завихрителя, распределительной шайбы, накидной гайки, корпуса, фланца, скобы и винта. Топливный ствол и паровая труба крепятся к корпусу, при этом топливный ствол располагается концентрично внутри паровой трубы. Жидкое топливо по топливному штуцеру, и пар по паровому штуцеру, подаются в топливный и паровой каналы фланца и дальше в одноименные каналы в корпусе. Из корпуса жидкое топливо попадает в топливный ствол, а пар в кольцевой канал между наружной поверхностью топливного ствола и внутренней поверхностью паровой трубы. Топливный завихритель, паровой завихритель, распределительная шайба и накидная гайка образуют распыливающую головку форсунки. В распыливающей головке, которую образуют топливный завихритель, паровой завихритель, распределительная шайба и накидная гайка, жидкое топливо через отверстия распределительной шайбы поступает в кольцевой канал топливного завихрителя и далее, по тангенциальным каналам, попадает в камеру завихрения, приобретая поступательно-вращательное движение. Выходя из сопла топливного завихрителя в виде пленки, жидкое топливо распадается на мелкие капли, образуя конус распыла. Паровой завихритель имеет тангенциальные каналы для закручивания парового потока, камеру завихрения и выходное отверстие. Пар, выходя закрученным потоком рядом с соплом топливного завихрителя, участвует в процессе распыливания топлива."

авихрителя и далее, по тангенциальным каналам, попадает в камеру завихрения, приобретая поступательно-вращательное движение. Выходя из сопла топливного завихрителя в виде пленки, жидкое топливо распадается на мелкие капли, образуя конус распыла. Паровой завихритель имеет тангенциальные каналы для закручивания парового потока, камеру завихрения и выходное отверстие. Пар, выходя закрученным потоком рядом с соплом топливного завихрителя, участвует в процессе распыливания топлива. Направление закрутки топлива и пара предусмотрено в одну сторону. Направление закрутки топлива и пара противоположно закрутке воздуха."

<script>
(function() {
    const modal = document.getElementById('item-desc-modal');
    if (!modal) return;
    const closeBtn = modal.querySelector('.close-modal-btn');
    const titleEl = document.getElementById('desc-modal-title');
    const priceEl = document.getElementById('desc-modal-price');
    const propsEl = document.getElementById('desc-modal-props');
    const descEl = document.getElementById('desc-modal-description');

    document.querySelectorAll('.btn-details').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            titleEl.textContent = this.dataset.itemTitle;
            priceEl.innerHTML = 'Цена: по запросу';
            propsEl.innerHTML = this.dataset.itemProps || '';
            descEl.innerHTML = this.dataset.itemDesc || 'Нет описания';
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });

    if (closeBtn) {
        closeBtn.onclick = function() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };
    }

    window.onclick = function(event) {
        if (event.target === modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };
})();
</script>
