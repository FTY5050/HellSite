 аппарат устанавливается на входе воздушного потока в корпус. Лопатки синхронно поворачиваются в направлении вращения рабочего колеса на угол от 0 до 90°. Привод лопаток направляющего аппарата осуществляется вручную либо от колонки дистанционного или автоматического регулирования. Эксплуатация вентиляторов Перед пуском в работу необходимо выполнить внешний осмотр вентилятора, обратив внимание на следующее: наличие ограждения валов и полумуфт; наличие заземления электродвигателей; прочность крепления электродвигателя, подшипников, вентилятора; наличие уплотнений в местах прохода вала через кожух; наличие ограждающих сеток у всасывающих патрубков; соответствие указателей положения регулирующих устройств у машины указателям, установленным на щите управления; плотность закрытия и легкость хода регулирующих устройств; отсутствие задеваний движущихся частей. Для проверки работы вентилятора на холостом ходу необходимо направляющий аппарат или шибер полностью закрыть и включить электродвигатель. Проверить отсутствие посторонних шумов, задеваний движущихся частей о корпус, вибрации подшипников. При работе на холостом ходу медленно открывать направляющий аппарат или шибер вентилятора таким образом, чтобы ток электродвигателя под нагрузкой не превышал допустимого значения. В процессе работы вентилятора необходимо: контролировать уровень масла в подшипниках; проверять температуру корпусов подшипников; контролировать показания амперметров электродвигателей; проверять на ощупь температуру статора электродвигателя; следить за исправным состоянием регулирующих устройств (направляющих аппаратов, шиберов)."
