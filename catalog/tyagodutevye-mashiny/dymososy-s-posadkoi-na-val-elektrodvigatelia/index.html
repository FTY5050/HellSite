    "description": "Описание Дымосос ДН-21-750 исполнен с посадкой рабочего колеса на вал ходовой части привода; корпус спиральный поворотный. Дымососы ДН-21-750 поставляются с углом разворота нагнетательного патрубка 255&deg;; при монтаже корпус может быть установлен с углом разворота нагнетательного патрубка от 0&deg; до 270&deg; через 15&deg;. Направление вращения рабочего колеса - правое и левое. Основными узлами дымососов ДН-21-750 являются: рабочее колесо, корпус (улитка), всасывающий патрубок, осевой направляющий аппарат, блок привода. Блок привода состоит из сварной рамы, ходовой части и электродвигателя. Ходовая часть состоит из корпуса, крышек, двух подшипниковых узлов, вала и соединительной упругой втулочно-пальцевой муфты, облегчающей замену двигателя. Рабочее колесо состоит из основного диска, переднего конического диска, 16-ти назад загнутых лопаток и ступицы. Рабочие колёса отбалансированы на заводе-изготовителе. Сварной спиральный корпус собран из двух боковых стенок и обечайки. Для создания необходимой жёсткости торцевые стенки корпуса усиливаются оребрением из полос. К передней стенке корпуса приваривается всасывающий патрубок цилиндрической формы. Регулирование производительности и полного давления дымососа осуществляется осевым направляющим аппаратом. Осевой направляющий аппарат состоит из сварного цилиндрического корпуса, поворотного кольца, восьми листовых лопаток, соединенных с поворотным кольцом рычажной системой и обтекателем. Привод лопаток направляющего аппарата осуществляется вручную либо от колонки дистанционного или автоматического регулирования. По отдельному договору с Заказчиком с дымососом ДН-21-750 может поставляться всасывающий карман. Всасывающий карман устанавливается на входе потока воздуха в корпус (крепится к патрубку болтами) и позволяет, изменяя направление потока на 90&deg;, стабилизировать его и повысить КПД тягодутьевой машины. Дымососы ДН-21-750 поставляются без упаковки, двигатель обёрнут полиэтиленовой плёнкой."

<div class="modal-overlay" id="item-desc-modal" style="display: none;">
<div class="modal-box" style="max-width: 600px;">
<button class="close-modal-btn">×</button>
<div class="modal-body">
<h3 class="modal-title" id="desc-modal-title"></h3>
<div class="modal-price" id="desc-modal-price"></div>
<div class="modal-props" id="desc-modal-props"></div>
<div class="modal-description" id="desc-modal-description"></div>
</div>
</div>
</div>

<script>
(function() {
    const modal = document.getElementById('item-desc-modal');
    if (!modal) return;
    const closeBtn = modal.querySelector('.close-modal-btn');
    const titleEl = document.getElementById('desc-modal-title');
    const priceEl = document.getElementById('desc-modal-price');
    const propsEl = document.getElementById('desc-modal-props');
    const descEl = document.getElementById('desc-modal-description');

    document.querySelectorAll('.btn-details').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            titleEl.textContent = this.dataset.itemTitle;
            priceEl.innerHTML = 'Цена: по запросу';
            propsEl.innerHTML = this.dataset.itemProps || '';
            descEl.innerHTML = this.dataset.itemDesc || 'Нет описания';
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });

    if (closeBtn) {
        closeBtn.onclick = function() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };
    }

    window.onclick = function(event) {
        if (event.target === modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };
})();
</script>
