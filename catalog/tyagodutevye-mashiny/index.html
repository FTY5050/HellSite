    "description": "Описание Вентилятор состоит из следующих корпус (улитка); рабочее колесо; всасывающий патрубок; электродвигатель-привод; рама (опора). Рабочее колесо — это устройство, состоящее из диска, к которому приварены или приклепаны 16-ть загнутых назад лопаток. К диску приклепана втулка (ступица), с помощью которой диск рабочего колеса закрепляется на валу электродвигателя. С целью предотвращения перегрева подшипников электродвигателей, расположенных со стороны рабочих колёс ( Передних подшипников), посадочные поверхности ступиц рабочих колёс имеют шлицевые пазы, что обеспечивает возможность применения вентиляторов в качестве дымососов . При вращении рабочего колеса воздух по воздуховоду подводится к центру рабочего колеса, где, за счет центробежных сил, отбрасывается от центра улитки к периферии и нагнетается в воздуховод. В центре рабочего колеса вентилятора образуется разрежение, куда беспрерывно поступает воздух. Регулирование производительности и полного давления в вентиляторе осуществляется осевым направляющим аппаратом (или ОНА). Осевой направляющий аппарат состоит из сварного цилиндрического корпуса, поворотного кольца, листовых лопаток, соединенных с поворотным кольцом рычажной системой и обтекателем. Направляющий аппарат устанавливается на входе воздушного потока в корпус. Лопатки синхронно поворачиваются в направлении вращения рабочего колеса на угол от 0 до 90°. Привод лопаток направляющего аппарата осуществляется вручную либо от колонки дистанционного или автоматического регулирования. Эксплуатация вентиляторов Перед пуском в работу необходимо выполнить внешний осмотр вентилятора, обратив внимание на следующее: наличие ограждения валов и полумуфт; наличие заземления электродвигателей; прочность крепления электродвигателя, подшипников, вентилятора; наличие поступления воды на охлаждение подшипников (при наличии ходовой части); наличие уплотнений в местах прохода вала через кожух; наличие ограждающих сеток у всасывающих патрубков; соответствие указателей положения регулирующих устройств у машины указателям, установленным на щите управления; плотность закрытия и легкость хода регулирующих устройств; отсутствие задеваний движущихся частей. Для проверки работы вентилятора на холостом ходу необходимо направляющий аппарат или шибер полностью закрыть и включить электродвигатель. Проверить отсутствие посторонних шумов, задеваний движущихся частей о корпус, вибрации подшипников. При работе на холостом ходу медленно открывать направляющий аппарат или шибер вентилятора таким образом, чтобы ток электродвигателя под нагрузкой не превышал допустимого значения. В процессе работы вентилятора необходимо: контролировать уровень масла в подшипниках; проверять температуру корпусов подшипников; следить за поступлением воды на охлаждение подшипников (при наличии ходовой части); контролировать показания амперметров электродвигателей; проверять на ощупь температуру статора электродвигателя; следить за исправным состоянием регулирующих устройств (направляющих аппаратов, шиберов)."
  },

 указателей положения регулирующих устройств у машины указателям, установленным на щите управления; плотность закрытия и легкость хода регулирующих устройств; отсутствие задеваний движущихся частей. Для проверки работы вентилятора на холостом ходу необходимо направляющий аппарат или шибер полностью закрыть и включить электродвигатель. Проверить отсутствие посторонних шумов, задеваний движущихся частей о корпус, вибрации подшипников. При работе на холостом ходу медленно открывать направляющий аппарат или шибер вентилятора таким образом, чтобы ток электродвигателя под нагрузкой не превышал допустимого значения. В процессе работы вентилятора необходимо: контролировать уровень масла в подшипниках; проверять температуру корпусов подшипников; следить за поступлением воды на охлаждение подшипников (при наличии ходовой части); контролировать показания амперметров электродвигателей; проверять на ощупь температуру статора электродвигателя; следить за исправным состоянием регулирующих устройств (направляющих аппаратов, шиберов)."

ие ограждающих сеток у всасывающих патрубков; соответствие указателей положения регулирующих устройств у машины указателям, установленным на щите управления; плотность закрытия и легкость хода регулирующих устройств; отсутствие задеваний движущихся частей. Для проверки работы вентилятора на холостом ходу необходимо направляющий аппарат или шибер полностью закрыть и включить электродвигатель. Проверить отсутствие посторонних шумов, задеваний движущихся частей о корпус, вибрации подшипников. При работе на холостом ходу медленно открывать направляющий аппарат или шибер вентилятора таким образом, чтобы ток электродвигателя под нагрузкой не превышал допустимого значения. В процессе работы вентилятора необходимо: контролировать уровень масла в подшипниках; проверять температуру корпусов подшипников; следить за поступлением воды на охлаждение подшипников (при наличии ходовой части); контролировать показания амперметров электродвигателей; проверять на ощупь температуру статора электродвигателя; следить за исправным состоянием регулирующих устройств (направляющих аппаратов, шиберов)."

<div class="modal-overlay" id="item-desc-modal" style="display: none;">
<div class="modal-box" style="max-width: 600px;">
<button class="close-modal-btn">×</button>
<div class="modal-body">
<h3 class="modal-title" id="desc-modal-title"></h3>
<div class="modal-price" id="desc-modal-price"></div>
<div class="modal-props" id="desc-modal-props"></div>
<div class="modal-description" id="desc-modal-description"></div>
</div>
</div>
</div>

<script>
(function() {
    const modal = document.getElementById('item-desc-modal');
    if (!modal) return;
    const closeBtn = modal.querySelector('.close-modal-btn');
    const titleEl = document.getElementById('desc-modal-title');
    const priceEl = document.getElementById('desc-modal-price');
    const propsEl = document.getElementById('desc-modal-props');
    const descEl = document.getElementById('desc-modal-description');

    document.querySelectorAll('.btn-details').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            titleEl.textContent = this.dataset.itemTitle;
            priceEl.innerHTML = 'Цена: по запросу';
            propsEl.innerHTML = this.dataset.itemProps || '';
            descEl.innerHTML = this.dataset.itemDesc || 'Нет описания';
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });

    if (closeBtn) {
        closeBtn.onclick = function() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };
    }

    window.onclick = function(event) {
        if (event.target === modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };
})();
</script>
