    "description": "Описание Циклон батарейный ЦБ-49 предназначен для очистки запылённых газов или воздуха от твёрдых частиц неслипающейся пыли или золы с размерами частиц более 5 мкм. Циклон ЦБ-49 применяется для улавливания: - золы в промышленных котельных и на тепловых электростанциях; - угольной пыли в сушильных установках обогатительных и брикетных фабрик и системах промышленной вентиляции; - неслипающейся пыли в различных отраслях хозяйства. Циклон ЦБ-49 представляет собой сварной корпус, в котором установлены ряды параллельно расположенных циклонных элементов с полуулиточным вводом газов в них. Циклон ЦБ-49 делится на три части: верхняя камера очищенных газов, средняя камера запыленных газов, нижняя - бункер сбора пыли. Циклонные элементы состоят из полых цилиндрических корпусов с конусной частью внизу и входными патрубками с аппаратами закручивания (полуулитками). Внутри элементов вертикально установлены выхлопные патрубки. Циклонные элементы в циклоне ЦБ-49 устанавливаются ступенчато по ходу движения газов так, что входные патрубки циклонных элементов последующего ряда располагаются ниже предыдущего. Нижние крышки входных патрубков последнего по ходу газа ряда циклонных элементов являются частью нижней трубной доски, что обеспечивает вынос пыли, осевшей на нижней трубной доске. На верхней крышке циклона установлен взрывной клапан. Циклон опирается на опорный пояс. Дымовой газ поступает во входное окно циклона ЦБ-49 и засасывается во входные патрубки циклонных элементов. Под действием гравитационных и центробежных сил из потока запылённого газа сепарируются частицы золы, которые осаждаются в бункере-накопителе. Зола периодически удаляется через шибер или другие устройства для выгрузки. Очищенный газ отводится из циклона через выходное окно.&nbsp;"

<script>
(function() {
    const modal = document.getElementById('item-desc-modal');
    if (!modal) return;
    const closeBtn = modal.querySelector('.close-modal-btn');
    const titleEl = document.getElementById('desc-modal-title');
    const priceEl = document.getElementById('desc-modal-price');
    const propsEl = document.getElementById('desc-modal-props');
    const descEl = document.getElementById('desc-modal-description');

    document.querySelectorAll('.btn-details').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            titleEl.textContent = this.dataset.itemTitle;
            priceEl.innerHTML = 'Цена: по запросу';
            propsEl.innerHTML = this.dataset.itemProps || '';
            descEl.innerHTML = this.dataset.itemDesc || 'Нет описания';
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });

    if (closeBtn) {
        closeBtn.onclick = function() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };
    }

    window.onclick = function(event) {
        if (event.target === modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };
})();
